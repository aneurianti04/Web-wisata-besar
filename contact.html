<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support & Booking - Pagar Alam</title>
    <style>
        /* CSS RESET & FULL SCREEN */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        :root { --biru: #0d47a1; --kuning: #FFD700; --gelap: #011627; }
        
        body { display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }

        /* NAVBAR FIX */
        nav { background: var(--biru); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--kuning); }
        nav ul { display: flex; list-style: none; gap: 15px; }
        nav ul li a { color: white; text-decoration: none; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .btn-nav { background: var(--kuning); color: var(--biru) !important; padding: 5px 15px; border-radius: 5px; }

        /* LAYOUT PERBAIKAN */
        .main-container { flex: 1; display: flex; height: calc(100vh - 70px); }
        
        /* SIDEBAR */
        .sidebar { flex: 0 0 150px; background: var(--gelap); display: flex; flex-direction: column; gap: 10px; padding: 20px 10px; }
        .tab-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 15px 5px; border-radius: 15px; cursor: pointer; transition: 0.3s; font-size: 0.7rem; font-weight: bold; }
        .tab-btn.active { background: var(--kuning); color: var(--gelap); }

        /* CONTENT AREA */
        .content { flex: 1; padding: 40px; overflow-y: auto; background: #f4f7f6; }
        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* FORM & CARD STYLING */
        .booking-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .full { grid-column: span 2; }
        .btn-submit { grid-column: span 2; background: var(--biru); color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .emergency-card { background: white; padding: 20px; border-radius: 15px; border-left: 8px solid red; margin-bottom: 15px; box-shadow: 0 5px 10px rgba(0,0,0,0.05); }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { flex-direction: row; flex: none; height: auto; overflow-x: auto; }
            .booking-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div style="color:white; font-weight:bold;">PAGAR ALAM</div>
        <ul>
            <li><a href="index.html">Beranda</a></li>
            <li><a href="destinasi.html">Jelajah</a></li>
            <li><a href="support.html" class="btn-nav">Bantuan</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <div class="sidebar">
            <button class="tab-btn active" onclick="openTab('info', this)">🚨 EMERGENCY</button>
            <button class="tab-btn" onclick="openTab('faq', this)">🔍 FAQ</button>
            <button class="tab-btn" onclick="openTab('book', this)">📝 BOOKING</button>
        </div>

        <div class="content">
            <div id="info" class="panel active">
                <h2 style="margin-bottom:20px;">Kontak Darurat</h2>
                <div class="emergency-card">
                    <h3>RSUD Besemah</h3>
                    <p>Telepon: (0730) 621020</p>
                </div>
                <div class="emergency-card">
                    <h3>Polres Pagar Alam</h3>
                    <p>Telepon: (0730) 621110</p>
                </div>
            </div>

            <div id="faq" class="panel">
                <h2 style="margin-bottom:20px;">Tanya Jawab</h2>
                <div style="background:white; padding:20px; border-radius:15px;">
                    <p><strong>Bagaimana cara pesan?</strong><br>Isi form di tab Booking dan tim kami akan menghubungi via WhatsApp.</p>
                </div>
            </div>

            <div id="book" class="panel">
                <h2 style="margin-bottom:20px;">Form Pemesanan Resmi</h2>
                <form class="booking-grid">
                    <div class="input-group"><label>Nama Lengkap</label><input type="text" placeholder="Sesuai KTP/Paspor"></div>
                    <div class="input-group"><label>WhatsApp</label><input type="text" placeholder="0812..."></div>
                    <div class="input-group"><label>Kewarganegaraan</label><select><option>Indonesia</option><option>Asing (WNA)</option></select></div>
                    <div class="input-group"><label>Titik Jemput</label><select><option>Bandara</option><option>Stasiun</option></select></div>
                    <div class="input-group full"><label>Catatan Medis/Alergi</label><textarea rows="3"></textarea></div>
                    <button type="button" class="btn-submit">PESAN SEKARANG</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function openTab(id, btn) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
